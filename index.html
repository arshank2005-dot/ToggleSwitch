<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toggle Switch & Dark Mode</title>
  
  <style>
    /* 1. NEW: Added transition for a smooth fade to dark mode */
    body {
      padding: 50px;
      font-family: sans-serif;
      background-color: white;
      color: black;
      transition: background-color 0.4s, color 0.4s; 
    }

    /* 2. NEW: The dark mode styles */
    body.dark-mode {
      background-color: #121212;
      color: #ffffff;
    }

    /* --- The Switch CSS (Unchanged) --- */
    .switch {
      position: relative;
      display: inline-block;
      width: 60px;
      height: 34px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: 0.4s;
      border-radius: 34px; 
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 26px;
      width: 26px;
      left: 4px;
      bottom: 4px;
      background-color: white;
      transition: 0.4s;
      border-radius: 50%; 
    }

    input:checked + .slider {
      background-color: #2196F3; 
    }

    input:checked + .slider:before {
      transform: translateX(26px);
    }

    input:focus + .slider {
      box-shadow: 0 0 1px #2196F3;
    }
    
  </style>
</head>
<body>

  <h2>Standard Toggle</h2>
  <label class="switch">
    <input type="checkbox" id="myToggle">
    <span class="slider"></span>
  </label>

  <br><br>

  <h2>Dark Mode Toggle</h2>
  <label class="switch">
    <input type="checkbox" id="darkModeToggle">
    <span class="slider"></span>
  </label>

  <h2>Jupiter is the largest planet in the solar system.</h2>

  <script>
    // Grab the dark mode toggle switch by its ID
    const themeSwitch = document.getElementById('darkModeToggle');

    // Listen for when it gets checked or unchecked
    themeSwitch.addEventListener('change', function() {
      // Toggle the 'dark-mode' class on the body on or off
      document.body.classList.toggle('dark-mode');
    });
  </script>

</body>
</html>
