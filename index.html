<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toggle Switch</title>
  
  <style>
    /* Add some basic padding to the body so the switch isn't stuck in the corner */
    body {
      padding: 50px;
      font-family: sans-serif;
    }

    /* The switch container */
    .switch {
      position: relative;
      display: inline-block;
      width: 60px;
      height: 34px;
    }

    /* Hide default HTML checkbox */
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    /* The slider track */
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: 0.4s;
      border-radius: 34px; /* Makes the track round */
    }

    /* The knob inside the slider */
    .slider:before {
      position: absolute;
      content: "";
      height: 26px;
      width: 26px;
      left: 4px;
      bottom: 4px;
      background-color: white;
      transition: 0.4s;
      border-radius: 50%; /* Makes the knob round */
    }

    /* Change background color when checked */
    input:checked + .slider {
      background-color: #2196F3; /* A nice blue color */
    }

    /* Move the knob to the right when checked */
    input:checked + .slider:before {
      transform: translateX(26px);
    }

    /* Optional: Add a subtle shadow when focused for accessibility */
    input:focus + .slider {
      box-shadow: 0 0 1px #2196F3;
    }
  </style>
</head>
<body>

  <label class="switch">
    <input type="checkbox" id="myToggle">
    <span class="slider"></span>
  </label>

</body>
</html>
